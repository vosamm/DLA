<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notice Ping</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 20px; font-weight: 700; color: #7c3aed; letter-spacing: -0.5px; }
    header span { font-size: 13px; color: #94a3b8; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 24px 32px;
    }

    .stat-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 18px 20px;
    }

    .stat-card .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 32px; font-weight: 700; margin-top: 6px; }
    .stat-card.total .value { color: #7c3aed; }
    .stat-card.content .value { color: #2563eb; }
    .stat-card.watches .value { color: #d97706; }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 0 32px;
      border-bottom: 1px solid #e2e8f0;
      background: #ffffff;
    }

    .tab {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      color: #94a3b8;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab.active { color: #7c3aed; border-bottom-color: #7c3aed; }
    .tab:hover:not(.active) { color: #64748b; }

    .content { padding: 24px 32px; }

    .refresh-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .refresh-row span { font-size: 13px; color: #94a3b8; }

    button.refresh {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #7c3aed;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button.refresh:hover { background: #f1f5f9; }

    .alert-list { display: flex; flex-direction: column; gap: 12px; }

    .alert-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 18px 20px;
      transition: border-color 0.15s;
    }

    .alert-card:hover { border-color: #c4b5fd; }

    .dismiss-btn {
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 0 0 0 8px;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .dismiss-btn:hover { color: #94a3b8; }

    .alert-card .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .site-tag {
      font-size: 12px;
      font-weight: 600;
      color: #7c3aed;
      text-decoration: none;
    }

    .site-tag:hover { text-decoration: underline; }

    .url-link {
      font-size: 12px;
      color: #2563eb;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 400px;
      display: inline-block;
    }

    .url-link:hover { text-decoration: underline; }

    .alert-card .meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .badge.content { background: #dbeafe; color: #2563eb; }

    .alert-card .time { font-size: 12px; color: #94a3b8; }

    .alert-card .alert-title {
      font-size: 15px;
      font-weight: 700;
      color: #1e293b;
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .alert-card .summary {
      font-size: 14px;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 10px;
    }


    .summary-link {
      color: #2563eb;
      word-break: break-all;
      text-decoration: none;
    }

    .summary-link:hover { text-decoration: underline; }

    .topics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .topic {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      color: #64748b;
    }

    .empty {
      text-align: center;
      padding: 64px;
      color: #94a3b8;
      font-size: 14px;
    }

    .empty .icon { font-size: 40px; margin-bottom: 12px; }

    .loading {
      text-align: center;
      padding: 48px;
      color: #94a3b8;
      font-size: 14px;
    }

    /* 모니터 관리 탭 */
    .add-form {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 24px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .add-form .field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 160px; }
    .add-form label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.4px; }

    .add-form input, .add-form select {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      color: #1e293b;
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-form input:focus, .add-form select:focus { border-color: #7c3aed; }
    .add-form input { flex: 2; min-width: 240px; }

    button.add-btn {
      background: #7c3aed;
      border: none;
      color: #fff;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button.add-btn:hover { background: #6d28d9; }
    button.add-btn:disabled { background: #a78bfa; opacity: 0.5; cursor: not-allowed; }

    .watch-list { display: flex; flex-direction: column; gap: 10px; }

    .watch-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px 18px;
    }

    .watch-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .watch-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .watch-card .watch-info { flex: 1; min-width: 0; }
    .watch-card .watch-title { font-size: 14px; font-weight: 500; color: #1e293b; margin-bottom: 3px; }
    .watch-card .watch-url { font-size: 12px; color: #2563eb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

    button.del-btn {
      background: transparent;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    button.del-btn:hover { background: #fee2e2; }

    button.edit-btn {
      background: transparent;
      border: 1px solid #e2e8f0;
      color: #64748b;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    button.edit-btn:hover { background: #f1f5f9; }

    .edit-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex: 1;
      min-width: 0;
    }

    .edit-row input {
      flex: 1;
      background: #f8fafc;
      border: 1px solid #7c3aed;
      border-radius: 6px;
      color: #1e293b;
      padding: 4px 10px;
      font-size: 14px;
      outline: none;
    }

    button.save-btn {
      background: #7c3aed;
      border: none;
      color: #fff;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
    }

    button.cancel-btn {
      background: transparent;
      border: 1px solid #e2e8f0;
      color: #64748b;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
    }

    button.settings-btn {
      background: transparent;
      border: 1px solid #e2e8f0;
      color: #64748b;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    button.settings-btn:hover { background: #f1f5f9; }
    button.settings-btn.active { background: #f1f5f9; border-color: #7c3aed; color: #7c3aed; }

    .settings-panel {
      border-top: 1px solid #f1f5f9;
      margin-top: 12px;
      padding-top: 12px;
    }

    .settings-row {
      display: flex;
      gap: 16px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .setting-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .setting-field label {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .setting-field select,
    .setting-field input[type="number"] {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      color: #1e293b;
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .setting-field select:focus,
    .setting-field input[type="number"]:focus { border-color: #7c3aed; }

    .setting-field input[type="number"] { width: 120px; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 14px;
      color: #1e293b;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.2s;
      z-index: 100;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: #059669; color: #059669; }
    .toast.error { border-color: #dc2626; color: #dc2626; }

    /* 도움말 버튼 */
    .help-btn {
      background: none;
      border: 1px solid #e2e8f0;
      color: #94a3b8;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .help-btn:hover { border-color: #7c3aed; color: #7c3aed; }

    /* 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #ffffff;
      border-radius: 14px;
      width: 100%;
      max-width: 620px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid #f1f5f9;
      flex-shrink: 0;
    }

    .modal-header h2 { font-size: 16px; font-weight: 700; color: #1e293b; }

    .modal-close {
      background: none;
      border: none;
      font-size: 20px;
      color: #94a3b8;
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }
    .modal-close:hover { color: #475569; }

    .modal-body {
      overflow-y: auto;
      padding: 20px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .help-section h3 {
      font-size: 13px;
      font-weight: 700;
      color: #7c3aed;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .help-section p, .help-section li {
      font-size: 13px;
      color: #475569;
      line-height: 1.7;
    }

    .help-section ul { padding-left: 16px; display: flex; flex-direction: column; gap: 4px; }

    .help-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .help-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px 14px;
    }

    .help-card .hc-title {
      font-size: 12px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 4px;
    }

    .help-card .hc-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 3px;
      margin-bottom: 6px;
    }

    .hc-badge.content { background: #dbeafe; color: #2563eb; }
    .hc-badge.market  { background: #ede9fe; color: #7c3aed; }

    .help-card p { font-size: 12px; color: #64748b; line-height: 1.6; }

    .help-tip {
      background: #fefce8;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #92400e;
      line-height: 1.6;
    }

    .help-link {
      color: #7c3aed;
      text-decoration: none;
      font-weight: 600;
    }
    .help-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>Notice Ping</h1>
  <div style="display:flex; align-items:center; gap:12px;">
    <span id="last-updated">로드 중...</span>
    <button class="help-btn" onclick="openHelp()" title="사용 방법">?</button>
  </div>
</header>


<div class="stats">
  <div class="stat-card total">
    <div class="label">전체 알림</div>
    <div class="value" id="stat-total">-</div>
  </div>
  <div class="stat-card watches">
    <div class="label">모니터 수</div>
    <div class="value" id="stat-watches">-</div>
  </div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="all">전체</div>
  <div class="tab" data-tab="manage">모니터 관리</div>
</div>

<div class="content">
  <!-- 알림 탭 -->
  <div id="alerts-panel">
    <div class="refresh-row">
      <span id="alert-count">알림 로드 중...</span>
      <button class="refresh" onclick="loadAll()">새로고침</button>
    </div>
    <div class="alert-list" id="alert-list">
      <div class="loading">데이터를 불러오는 중...</div>
    </div>
  </div>

  <!-- 모니터 관리 탭 -->
  <div id="manage-panel" style="display:none;">
    <div style="display:flex; justify-content:flex-end; margin-bottom:12px;">
      <a href="http://localhost:5000" target="_blank" rel="noopener"
         style="font-size:13px; color:#7c3aed; text-decoration:none; display:flex; align-items:center; gap:5px;">
        changedetection.io 열기 ↗
      </a>
    </div>
    <div class="add-form">
      <div class="field" style="flex:2;min-width:240px;">
        <label>URL</label>
        <input id="new-url" type="url" placeholder="https://example.com" />
      </div>
      <div class="field">
        <label>이름 (선택)</label>
        <input id="new-title" type="text" placeholder="ex) 사이트 이름" />
      </div>
      <button class="add-btn" id="add-btn" onclick="addWatch()">추가</button>
    </div>
    <div class="watch-list" id="watch-list">
      <div class="loading">로드 중...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let currentTab = 'all';
  let watchesCache = [];

  // ── 탭 생성 ────────────────────────────────────────────────────────────────
  async function buildTabs() {
    try {
      const res = await fetch('/api/watches/');
      watchesCache = await res.json();
    } catch (e) {
      watchesCache = [];
    }

    const tabsEl = document.getElementById('tabs');
    // 기존 watch 탭만 제거 (전체·모니터 관리는 유지)
    tabsEl.querySelectorAll('[data-uuid]').forEach(el => el.remove());

    // 모니터 관리 탭 앞에 watch 탭들 삽입
    const manageTab = tabsEl.querySelector('[data-tab="manage"]');
    watchesCache.forEach(w => {
      const tab = document.createElement('div');
      tab.className = 'tab';
      tab.dataset.uuid = w.uuid;
      tab.textContent = w.title || w.url;
      tab.addEventListener('click', () => switchTab(tab));
      tabsEl.insertBefore(tab, manageTab);
    });

    // 현재 탭이 사라진 경우 전체로 초기화
    const stillExists = currentTab === 'all' || currentTab === 'manage' ||
      watchesCache.some(w => w.uuid === currentTab);
    if (!stillExists) currentTab = 'all';

    // 활성 탭 표시
    tabsEl.querySelectorAll('.tab').forEach(t => {
      const isActive = t.dataset.uuid === currentTab || t.dataset.tab === currentTab;
      t.classList.toggle('active', isActive);
    });
  }

  function switchTab(tabEl) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tabEl.classList.add('active');
    currentTab = tabEl.dataset.uuid || tabEl.dataset.tab;

    if (currentTab === 'manage') {
      document.getElementById('alerts-panel').style.display = 'none';
      document.getElementById('manage-panel').style.display = 'block';
      loadWatches();
    } else {
      document.getElementById('alerts-panel').style.display = 'block';
      document.getElementById('manage-panel').style.display = 'none';
      loadAlerts();
    }
  }

  // 정적 탭(전체, 모니터 관리) 클릭 이벤트
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab));
  });

  // ── 토스트 ─────────────────────────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    setTimeout(() => { el.className = 'toast'; }, 3000);
  }

  // ── 데이터 로드 ────────────────────────────────────────────────────────────
  async function loadAll() {
    await buildTabs();
    await Promise.all([loadStats(), loadAlerts()]);
    document.getElementById('last-updated').textContent =
      '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
  }

  async function loadStats() {
    try {
      const res = await fetch('/api/alerts/stats');
      const data = await res.json();
      document.getElementById('stat-watches').textContent = data.total_watches;
    } catch (e) {
      console.error('Stats load error:', e);
    }
  }

  async function loadAlerts() {
    const list = document.getElementById('alert-list');
    list.innerHTML = '<div class="loading">불러오는 중...</div>';

    try {
      const isUuid = currentTab !== 'all' && currentTab !== 'content';
      const alertUrl = isUuid
        ? `/api/alerts/?watch_uuid=${currentTab}`
        : '/api/alerts/';

      const alertsRes = await fetch(alertUrl);
      const alerts = await alertsRes.json();

      // uuid → {title, url} 맵 (캐시 사용)
      const watchMap = {};
      watchesCache.forEach(w => { watchMap[w.uuid] = w; });

      if (currentTab === 'all') {
        list.innerHTML = alerts.map(alert => {
          const w = watchMap[alert.watch_uuid] || {};
          const label = w.title || w.url || alert.url;
          return renderAlert(alert, label);
        }).join('');
      } else {
        list.innerHTML = alerts.map(alert => renderAlert(alert)).join('');
      }

      const visible = document.querySelectorAll('#alert-list .alert-card').length;
      document.getElementById('alert-count').textContent = `${visible}개의 알림`;
      if (currentTab === 'all') {
        document.getElementById('stat-total').textContent = visible;
      }

      if (visible === 0) {
        list.innerHTML = `<div class="empty"><div class="icon">📭</div>아직 알림이 없습니다.</div>`;
      }

    } catch (e) {
      list.innerHTML = '<div class="empty"><div class="icon">⚠️</div>알림을 불러오지 못했습니다.</div>';
    }
  }

  // ── 닫기(dismiss) ─────────────────────────────────────────────────────────
  const dismissed = new Set(JSON.parse(localStorage.getItem('dismissedAlerts') || '[]'));

  function dismissAlert(id, el) {
    dismissed.add(id);
    localStorage.setItem('dismissedAlerts', JSON.stringify([...dismissed]));
    el.closest('.alert-card').remove();

    const remaining = document.querySelectorAll('#alert-list .alert-card').length;
    document.getElementById('alert-count').textContent = `${remaining}개의 알림`;
    if (currentTab === 'all') {
      document.getElementById('stat-total').textContent = remaining;
    }
  }

  // ── 알림 카드 렌더링 ───────────────────────────────────────────────────────
  function renderAlert(alert, siteLabel) {
    if (dismissed.has(alert.id)) return '';

    const a = alert.analysis;
    const time = alert.changed_at
      ? new Date(alert.changed_at * 1000).toLocaleString('ko-KR')
      : '-';

    const linkText = siteLabel || alert.url;
    const linkClass = siteLabel ? 'site-tag' : 'url-link';
    const siteTag = `<a class="${linkClass}" href="${escHtml(alert.url)}" target="_blank" rel="noopener">${escHtml(linkText)}</a>`;

    // Title: shown verbatim if present (new format); fall back gracefully for old alerts
    const titleHtml = a.title
      ? `<div class="alert-title">${escHtml(a.title)}</div>`
      : '';

    const summaryHtml = a.summary
      ? `<div class="summary">${linkify(a.summary)}</div>`
      : '';


    return `
      <div class="alert-card">
        <div class="top">
          ${siteTag}
          <div class="meta">
            <span class="time">${time}</span>
            <button class="dismiss-btn" onclick="dismissAlert(${alert.id}, this)" title="닫기">&times;</button>
          </div>
        </div>
        ${titleHtml}
        ${summaryHtml}
      </div>`;
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function linkify(text) {
    if (!text) return '';
    return text.split(/(https?:\/\/[^\s"'<>()]+)/g).map((part, i) => {
      if (i % 2 === 1) {
        const escaped = escHtml(part);
        return `<a href="${escaped}" target="_blank" rel="noopener" class="summary-link">${escaped}</a>`;
      }
      return escHtml(part);
    }).join('');
  }

  // ── 모니터 관리 ────────────────────────────────────────────────────────────
  async function loadWatches() {
    const list = document.getElementById('watch-list');
    list.innerHTML = '<div class="loading">로드 중...</div>';
    try {
      const res = await fetch('/api/watches/');
      const watches = await res.json();
      if (watches.length === 0) {
        list.innerHTML = '<div class="empty"><div class="icon">📡</div>등록된 모니터가 없습니다.</div>';
        return;
      }
      list.innerHTML = watches.map(w => renderWatchCard(w)).join('');
    } catch (e) {
      list.innerHTML = '<div class="empty"><div class="icon">⚠️</div>불러오지 못했습니다.</div>';
    }
  }

  function renderWatchCard(w) {
    const skipVal = (w.ignore_top_lines !== null && w.ignore_top_lines !== undefined) ? w.ignore_top_lines : '';
    return `
      <div class="watch-card" id="watch-${w.uuid}">
        <div class="watch-main">
          <div class="watch-info">
            <div class="watch-title">${escHtml(w.title || w.url)}</div>
            <a class="watch-url" href="${escHtml(w.url)}" target="_blank" rel="noopener">${escHtml(w.url)}</a>
          </div>
          <div class="watch-actions">
            <button class="settings-btn" id="settings-btn-${w.uuid}" onclick="toggleSettings('${w.uuid}')">설정</button>
            <button class="edit-btn" onclick="editWatch('${w.uuid}', '${escHtml(w.title || '')}')">수정</button>
            <button class="del-btn" onclick="deleteWatch('${w.uuid}')">삭제</button>
          </div>
        </div>
        <div class="settings-panel" id="settings-${w.uuid}" style="display:none;">
          <div class="settings-row">
            <div class="setting-field">
              <label>타입</label>
              <select id="type-${w.uuid}">
                <option value="content" ${w.type === 'content' ? 'selected' : ''}>공지/뉴스 (content)</option>
                <option value="market" ${w.type === 'market' ? 'selected' : ''}>거래/상품 (market)</option>
              </select>
            </div>
            <div class="setting-field">
              <label>상단 무시 라인 수</label>
              <input type="number" id="skip-${w.uuid}" value="${skipVal}" placeholder="기본값 (10)" min="0" />
            </div>
            <button class="save-btn" onclick="saveSettings('${w.uuid}')">저장</button>
          </div>
        </div>
      </div>`;
  }

  function toggleSettings(uuid) {
    const panel = document.getElementById(`settings-${uuid}`);
    const btn = document.getElementById(`settings-btn-${uuid}`);
    const isOpen = panel.style.display !== 'none';
    panel.style.display = isOpen ? 'none' : 'block';
    btn.classList.toggle('active', !isOpen);
  }

  async function saveSettings(uuid) {
    const card = document.getElementById(`watch-${uuid}`);
    const title = card.querySelector('.watch-title').textContent;
    const type = document.getElementById(`type-${uuid}`).value;
    const skipInput = document.getElementById(`skip-${uuid}`).value;
    const ignore_top_lines = skipInput === '' ? null : parseInt(skipInput);
    try {
      const res = await fetch(`/api/watches/${uuid}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, type, ignore_top_lines }),
      });
      if (!res.ok) throw new Error(await res.text());
      showToast('설정이 저장됐습니다');
      toggleSettings(uuid);
    } catch (e) {
      showToast('저장 실패: ' + e.message, 'error');
    }
  }

  function editWatch(uuid, currentTitle) {
    const card = document.getElementById(`watch-${uuid}`);
    const info = card.querySelector('.watch-info');
    const url = card.querySelector('.watch-url').textContent;
    info.outerHTML = `
      <div class="edit-row" id="edit-row-${uuid}">
        <input id="edit-input-${uuid}" type="text" value="${escHtml(currentTitle)}" placeholder="이름 입력" />
        <button class="save-btn" onclick="saveWatch('${uuid}', '${escHtml(url)}')">저장</button>
        <button class="cancel-btn" onclick="loadWatches()">취소</button>
      </div>`;
    card.querySelector('.edit-btn').style.display = 'none';
    card.querySelector('.del-btn').style.display = 'none';
    card.querySelector('.settings-btn').style.display = 'none';
    document.getElementById(`edit-input-${uuid}`).focus();
  }

  async function saveWatch(uuid, url) {
    const input = document.getElementById(`edit-input-${uuid}`);
    const title = input.value.trim();
    try {
      const res = await fetch(`/api/watches/${uuid}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title }),
      });
      if (!res.ok) throw new Error(await res.text());
      showToast('이름이 수정됐습니다');
      loadWatches();
    } catch (e) {
      showToast('수정 실패: ' + e.message, 'error');
    }
  }

  async function addWatch() {
    const url = document.getElementById('new-url').value.trim();
    const title = document.getElementById('new-title').value.trim();
    if (!url) { showToast('URL을 입력하세요', 'error'); return; }

    const btn = document.getElementById('add-btn');
    btn.disabled = true;
    try {
      const res = await fetch('/api/watches/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, title }),
      });
      if (!res.ok) throw new Error(await res.text());
      document.getElementById('new-url').value = '';
      document.getElementById('new-title').value = '';
      showToast('모니터가 추가됐습니다');
      await buildTabs();
      loadWatches();
      loadStats();
    } catch (e) {
      showToast('추가 실패: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  async function deleteWatch(uuid) {
    if (!confirm('이 모니터를 삭제할까요?')) return;
    try {
      const res = await fetch(`/api/watches/${uuid}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(await res.text());
      document.getElementById(`watch-${uuid}`)?.remove();
      showToast('삭제됐습니다');
      await buildTabs();
      loadStats();
    } catch (e) {
      showToast('삭제 실패: ' + e.message, 'error');
    }
  }

  // ── 도움말 모달 ────────────────────────────────────────────────────────────
  async function openHelp() {
    if (!document.getElementById('help-modal')) {
      const res = await fetch('/static/help.html');
      const html = await res.text();
      document.body.insertAdjacentHTML('beforeend', html);
    }
    document.getElementById('help-modal').classList.add('open');
    document.addEventListener('keydown', closeHelpOnEsc);
  }

  function closeHelp() {
    document.getElementById('help-modal').classList.remove('open');
    document.removeEventListener('keydown', closeHelpOnEsc);
  }

  function closeHelpOnOverlay(e) {
    if (e.target === document.getElementById('help-modal')) closeHelp();
  }

  function closeHelpOnEsc(e) {
    if (e.key === 'Escape') closeHelp();
  }

  // ── 자동 새로고침 (30초) ───────────────────────────────────────────────────
  loadAll();
  setInterval(loadAll, 30000);
</script>
</body>
</html>
